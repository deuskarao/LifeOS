<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="v1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#606060"/>
      <stop offset="20%" stop-color="#a0a0a0"/>
      <stop offset="40%" stop-color="#e0e0e0"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e0e0e0"/>
      <stop offset="80%" stop-color="#a0a0a0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="v2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#808080"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </linearGradient>
  </defs>
  <!-- Diamond top facet -->
  <polygon points="100,30 150,70 100,90 50,70" fill="url(#v1)" opacity="0.9"/>
  <!-- Diamond middle left -->
  <polygon points="50,70 100,90 100,130 50,110" fill="url(#v2)" opacity="0.7"/>
  <!-- Diamond middle right -->
  <polygon points="150,70 100,90 100,130 150,110" fill="url(#v1)" opacity="0.8"/>
  <!-- Diamond bottom -->
  <polygon points="50,110 100,130 150,110 100,170" fill="url(#v2)" opacity="0.6"/>
  <!-- Facet lines -->
  <line x1="100" y1="30" x2="100" y2="90" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="70" x2="150" y2="70" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="110" x2="150" y2="110" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="90" x2="100" y2="170" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  <!-- Sparkle -->
  <circle cx="100" cy="60" r="3" fill="#ffffff" opacity="0.8"/>
</svg>